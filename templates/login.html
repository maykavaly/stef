<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Arial, sans-serif; background: #f6f7f9; color: #111827; }
    form { width: min(360px, calc(100vw - 32px)); background: #fff; border: 1px solid #e5e7eb; padding: 24px; border-radius: 8px; box-shadow: 0 10px 24px rgba(0,0,0,.06); }
    input, button { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 6px; border: 1px solid #d1d5db; margin-top: 10px; }
    button { background: #111827; color: #fff; cursor: pointer; }
    .error { color: #b91c1c; }
  </style>
</head>
<body>
  <form method="post" action="/login">
    <h1>Admin Login</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <input type="password" name="password" placeholder="Admin password" required>
    <button type="submit">Login</button>
  </form>
</body>
</html>
